# Orquestração do AdSignage para ambiente autohospedado.
#
# Sobe um único serviço (backend FastAPI) que também serve o frontend
# (painel admin e player) e as mídias enviadas. Um volume nomeado garante a
# persistência do banco SQLite e dos arquivos de mídia entre reinicializações.

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adsignage
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Teto de memória do container (Compose v2, modo não-swarm). Protege o host
    # (ex.: Raspberry Pi 4 com 4 GB) de ter toda a RAM consumida pela aplicação.
    mem_limit: 512m
    mem_reservation: 256m
    # Variaveis sensiveis (senha, secret) e ajustaveis vem do .env na raiz.
    # As definidas em 'environment' abaixo fixam caminhos internos do container.
    env_file:
      - .env
    environment:
      APP_NAME: AdSignage
      DEBUG: "false"
      # Banco SQLite dentro do volume persistente.
      DATABASE_URL: sqlite:////app/data/adsignage.db
      MEDIA_DIR: /app/data/media
      # O frontend é montado dentro do container (veja volumes).
      FRONTEND_DIR: /app/frontend
      MAX_UPLOAD_MB: "200"
      CORS_ORIGINS: "*"
      # Perfil enxuto de execução.
      WEB_CONCURRENCY: "1"
      MALLOC_ARENA_MAX: "2"
    volumes:
      # Dados persistentes (banco + mídias).
      - adsignage_data:/app/data
      # Frontend servido pelo backend (read-only).
      - ./frontend:/app/frontend:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  adsignage_data:
