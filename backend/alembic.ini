# Configuração do Alembic para o AdSignage.
#
# A URL do banco é resolvida dinamicamente em migrations/env.py a partir de
# `app.config.settings.database_url` (que respeita a variável DATABASE_URL).
# O valor abaixo é apenas um placeholder e é sobrescrito em tempo de execução.

[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = sqlite:///data/adsignage.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
