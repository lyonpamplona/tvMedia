<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdSignage — Painel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>📺 AdSignage</h1>
    <span class="subtitle">Painel de administração — edição em tempo real</span>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="screens">Telas</button>
    <button class="tab" data-tab="playlists">Playlists</button>
    <button class="tab" data-tab="media">Mídias</button>
  </nav>

  <main>
    <!-- ================= TELAS ================= -->
    <section id="tab-screens" class="panel active">
      <div class="panel-header">
        <h2>Telas (TVs)</h2>
      </div>
      <form id="screen-form" class="inline-form">
        <input type="text" id="screen-name" placeholder="Nome da tela (ex.: Vitrine Loja 1)" required />
        <select id="screen-playlist"><option value="">Sem playlist</option></select>
        <button type="submit">Adicionar tela</button>
      </form>
      <div id="screens-list" class="cards"></div>
    </section>

    <!-- ================= PLAYLISTS ================= -->
    <section id="tab-playlists" class="panel">
      <div class="panel-header">
        <h2>Playlists</h2>
      </div>
      <form id="playlist-form" class="inline-form">
        <input type="text" id="playlist-name" placeholder="Nome da playlist" required />
        <button type="submit">Criar playlist</button>
      </form>
      <div class="split">
        <div id="playlists-list" class="list"></div>
        <div id="playlist-editor" class="editor">
          <p class="muted">Selecione uma playlist para editar.</p>
        </div>
      </div>
    </section>

    <!-- ================= MÍDIAS ================= -->
    <section id="tab-media" class="panel">
      <div class="panel-header">
        <h2>Mídias</h2>
      </div>

      <div class="split">
        <form id="upload-form" class="stack-form">
          <h3>Enviar arquivo (imagem/vídeo)</h3>
          <input type="text" id="upload-name" placeholder="Nome" required />
          <input type="file" id="upload-file" accept="image/*,video/*" required />
          <button type="submit">Enviar</button>
        </form>

        <form id="content-form" class="stack-form">
          <h3>Criar texto / HTML / URL</h3>
          <input type="text" id="content-name" placeholder="Nome" required />
          <select id="content-type">
            <option value="text">Texto</option>
            <option value="html">HTML</option>
            <option value="url">URL (página web)</option>
          </select>
          <textarea id="content-body" placeholder="Conteúdo de texto/HTML ou URL"></textarea>
          <button type="submit">Criar</button>
        </form>
      </div>

      <div id="media-list" class="cards"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
