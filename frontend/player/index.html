<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdSignage — Player</title>
  <style>
    /* Player em tela cheia, fundo preto, sem barras de rolagem. */
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    #stage img, #stage video, #stage iframe {
      max-width: 100%; max-height: 100%; width: 100%; height: 100%;
      object-fit: contain; border: 0;
    }
    .text-slide {
      color: #fff; font-family: system-ui, sans-serif; font-size: 5vw;
      text-align: center; padding: 6vw; line-height: 1.3;
    }
    #status {
      position: fixed; bottom: 10px; right: 14px; color: #444;
      font-family: monospace; font-size: 12px; z-index: 10;
    }
    #message {
      color: #888; font-family: system-ui, sans-serif; font-size: 3vw; text-align: center;
    }
  </style>
</head>
<body>
  <div id="stage"><div id="message">Conectando…</div></div>
  <div id="status"></div>
  <script src="player.js"></script>
</body>
</html>
