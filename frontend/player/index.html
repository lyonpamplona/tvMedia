<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tvMedia — Player</title>
  <style>
    /* Reset e tela cheia preta, sem barras de rolagem. */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #stage { position: relative; width: 100vw; height: 100vh; background: #000; }

    /* Cada zona ocupa uma região absoluta da tela (definida em %). */
    .zone { position: absolute; overflow: hidden; background: #000; }

    /* Camadas de mídia dentro da zona (usadas para crossfade). */
    .layer {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 600ms ease, transform 600ms ease;
    }
    .layer.visible { opacity: 1; transform: none; }
    .layer.fade { opacity: 0; }
    .layer.slide { transform: translateX(40px); opacity: 0; }

    .layer img, .layer video, .layer iframe {
      width: 100%; height: 100%; border: 0; background: #000;
    }
    .fit-contain img, .fit-contain video { object-fit: contain; }
    .fit-cover img, .fit-cover video { object-fit: cover; }
    .fit-fill img, .fit-fill video { object-fit: fill; }
    .layer img, .layer video { object-position: var(--focal, center); }
    #emergency { position: fixed; inset: 0; z-index: 10001; display: none; align-items: center; justify-content: center; text-align: center; padding: 8vmin; background: #b91c1c; color: #fff; font-family: system-ui, -apple-system, sans-serif; font-size: 6vmin; font-weight: 800; line-height: 1.25; white-space: pre-wrap; }
    #emergency.show { display: flex; }

    /* Slide de texto/HTML. */
    .text-slide {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 4vmin;
      color: #fff; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 5vmin; line-height: 1.3;
      background: radial-gradient(circle at 50% 30%, #1f2937, #000);
    }

    /* Indicadores de status / mensagens (canto inferior). */
    #status {
      position: fixed; right: 12px; bottom: 12px; z-index: 9999;
      width: 10px; height: 10px; border-radius: 50%;
      background: #ef4444; box-shadow: 0 0 8px rgba(0,0,0,.6);
      transition: background 300ms ease;
    }
    #status.online { background: #22c55e; }
    #message {
      position: fixed; inset: 0; z-index: 9998;
      display: none; align-items: center; justify-content: center;
      color: #cbd5e1; font-family: system-ui, sans-serif; font-size: 4vmin;
      text-align: center; padding: 6vmin; background: #000;
    }
    #message.show { display: flex; }
    /* ---- v18: widgets (relogio, clima, tickers) ---- */
    .widget { width:100%; height:100%; display:flex; flex-direction:column; color:#fff; font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
    .widget-clock, .widget-weather { align-items:center; justify-content:center; text-align:center; gap:1vmin; background: radial-gradient(circle at 50% 30%, #1f2937, #000); padding:3vmin; }
    .widget-clock .w-title, .widget-weather .w-title { font-size:3.2vmin; color:#93c5fd; letter-spacing:.04em; text-transform:uppercase; }
    .widget-clock .w-time { font-size:16vmin; font-weight:700; line-height:1; font-variant-numeric: tabular-nums; }
    .widget-clock .w-date { font-size:3.4vmin; color:#cbd5e1; text-transform:capitalize; }
    .widget-weather .w-wx { display:flex; align-items:center; gap:2vmin; }
    .widget-weather .w-ico { font-size:12vmin; line-height:1; }
    .widget-weather .w-temp { font-size:14vmin; font-weight:700; line-height:1; }
    .widget-weather .w-cond { font-size:4vmin; color:#cbd5e1; }
    .widget-ticker { flex-direction:row; align-items:center; height:100%; background:linear-gradient(90deg,#111827,#0b1220); overflow:hidden; }
    .widget-ticker .t-label { flex:0 0 auto; align-self:stretch; display:flex; align-items:center; padding:0 2.4vmin; background:#2563eb; color:#fff; font-weight:700; font-size:3.4vmin; text-transform:uppercase; letter-spacing:.04em; }
    .widget-promo .t-label { background:#dc2626; }
    .widget-ticker .t-track { flex:1 1 auto; overflow:hidden; position:relative; height:100%; display:flex; align-items:center; }
    .widget-ticker .t-move { display:inline-flex; align-items:center; white-space:nowrap; will-change:transform; animation: ticker-scroll linear infinite; }
    .widget-ticker .t-item { font-size:4vmin; padding:0 1.2vmin; color:#f8fafc; }
    .widget-ticker .t-item b { color:#fde047; }
    .widget-ticker .t-item em { color:#93c5fd; font-style:normal; font-size:3vmin; }
    .widget-ticker .t-sep { color:#475569; padding:0 1vmin; font-size:3vmin; }
    @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
      .audio-card { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin; }
    .audio-card .audio-icon { font-size: 9vmin; line-height: 1; opacity: .92; }
    .audio-card .audio-label { font-size: 3.6vmin; color: #e2e8f0; max-width: 80%; text-align: center; }
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="status" title="Conexão em tempo real"></div>
  <div id="message"></div>
  <div id="emergency"></div>
  <audio id="bg-audio" loop></audio>
  <button id="sound-enable" hidden style="position:fixed;left:12px;bottom:12px;z-index:9999;padding:10px 14px;border:0;border-radius:8px;background:#7aa2f7;color:#0b0d16;font:600 14px system-ui;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.5)">Ativar som</button>
  <script src="player.js"></script>
</body>
</html>
