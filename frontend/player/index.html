<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tvMedia — Player</title>
  <style>
    /* Reset e tela cheia preta, sem barras de rolagem. */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--tv-bg, #000); }
    #stage { position: relative; width: 100vw; height: 100vh; background: var(--tv-bg, #000); }

    /* Cada zona ocupa uma região absoluta da tela (definida em %). */
    .zone { position: absolute; overflow: hidden; background: #000; container-type: size; }

    /* Camadas de mídia dentro da zona (usadas para crossfade). */
    .layer {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 600ms ease, transform 600ms ease;
    }
    .layer.visible { opacity: 1; transform: none; }
    .layer.fade { opacity: 0; }
    .layer.slide { transform: translateX(40px); opacity: 0; }

    .layer img, .layer video, .layer iframe {
      width: 100%; height: 100%; border: 0; background: #000;
    }
    .fit-contain img, .fit-contain video { object-fit: contain; }
    .fit-cover img, .fit-cover video { object-fit: cover; }
    .fit-fill img, .fit-fill video { object-fit: fill; }
    /* v30: wrapper que ajusta iframes (YouTube) ao tamanho da zona sem barras. */
    .iframe-fit { position: absolute; inset: 0; overflow: hidden; background: #000; }
    .iframe-fit iframe { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 0; }
    /* v30: estado vazio (zona sem conteudo) */
    .zone-empty { flex-direction:column; gap:1.5cqmin; color:#64748b; background:repeating-linear-gradient(45deg,#0b0d16,#0b0d16 14px,#0f131f 14px,#0f131f 28px); }
    .zone-empty .ze-ico { font-size:clamp(20px,16cqmin,90px); line-height:1; opacity:.6; }
    .zone-empty .ze-msg { font-size:clamp(11px,7cqmin,34px); font-weight:700; color:#94a3b8; }
    .zone-empty .ze-sub { font-size:clamp(9px,4.5cqmin,18px); color:#475569; }
    .layer img, .layer video { object-position: var(--focal, center); }
    #emergency { position: fixed; inset: 0; z-index: 10001; display: none; align-items: center; justify-content: center; text-align: center; padding: 8vmin; background: #b91c1c; color: #fff; font-family: system-ui, -apple-system, sans-serif; font-size: 6vmin; font-weight: 800; line-height: 1.25; white-space: pre-wrap; }
    #emergency.show { display: flex; }

    /* Slide de texto/HTML. */
    .text-slide {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 6cqmin;
      color: var(--tv-text, #fff); font-family: var(--tv-font, system-ui, -apple-system, Segoe UI, Roboto, sans-serif);
      font-size: clamp(12px, 9cqmin, 96px); line-height: 1.3;
      background: var(--tv-slide-bg, radial-gradient(circle at 50% 30%, #1f2937, #000));
    }

    /* Indicadores de status / mensagens (canto inferior). */
    #status {
      position: fixed; right: 12px; bottom: 12px; z-index: 9999;
      width: 10px; height: 10px; border-radius: 50%;
      background: #ef4444; box-shadow: 0 0 8px rgba(0,0,0,.6);
      transition: background 300ms ease;
    }
    #status.online { background: #22c55e; }
    #message {
      position: fixed; inset: 0; z-index: 9998;
      display: none; align-items: center; justify-content: center;
      color: #cbd5e1; font-family: system-ui, sans-serif; font-size: 4vmin;
      text-align: center; padding: 6vmin; background: #000;
    }
    #message.show { display: flex; }
    /* ---- v18: widgets (relogio, clima, tickers) ---- */
    .widget { width:100%; height:100%; display:flex; flex-direction:column; color:var(--tv-text,#fff); font-family: var(--tv-font, system-ui,-apple-system,Segoe UI,Roboto,sans-serif); }
    .widget-clock, .widget-weather { align-items:center; justify-content:center; text-align:center; gap:2cqmin; background: var(--tv-slide-bg, radial-gradient(circle at 50% 30%, #1f2937, #000)); padding:4cqmin; }
    .widget-clock .w-title, .widget-weather .w-title { font-size:clamp(9px,7cqmin,40px); color:var(--tv-accent,#93c5fd); letter-spacing:.04em; text-transform:uppercase; }
    .widget-clock .w-time { font-size:clamp(16px,26cqmin,220px); font-weight:700; line-height:1; font-variant-numeric: tabular-nums; }
    .widget-clock .w-date { font-size:clamp(9px,7cqmin,44px); color:#cbd5e1; text-transform:capitalize; }
    .widget-weather .w-wx { display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:3cqmin; max-width:100%; }
    .widget-weather .w-ico { font-size:clamp(14px,22cqmin,150px); line-height:1; }
    .widget-weather .w-temp { font-size:clamp(16px,26cqmin,180px); font-weight:700; line-height:1; }
    .widget-weather .w-cond { font-size:clamp(10px,8cqmin,48px); color:#cbd5e1; }
    .widget-ticker { flex-direction:row; align-items:center; height:100%; background:var(--tv-ticker-bg,linear-gradient(90deg,#111827,#0b1220)); overflow:hidden; }
    .widget-ticker .t-label { flex:0 0 auto; align-self:stretch; display:flex; align-items:center; padding:0 3cqh; background:var(--tv-accent,#2563eb); color:#fff; font-weight:700; font-size:clamp(10px,38cqh,40px); text-transform:uppercase; letter-spacing:.04em; }
    .widget-promo .t-label { background:#dc2626; }
    .widget-ticker .t-track { flex:1 1 auto; overflow:hidden; position:relative; height:100%; display:flex; align-items:center; }
    .widget-ticker .t-move { display:inline-flex; align-items:center; white-space:nowrap; will-change:transform; animation: ticker-scroll linear infinite; }
    .widget-ticker .t-item { font-size:clamp(10px,40cqh,44px); padding:0 1.4cqh; color:var(--tv-ticker-text,#f8fafc); }
    .widget-ticker .t-item b { color:#fde047; }
    .widget-ticker .t-item em { color:#93c5fd; font-style:normal; font-size:clamp(8px,30cqh,32px); }
    .widget-ticker .t-sep { color:#475569; padding:0 1.4cqh; font-size:clamp(8px,30cqh,32px); }
    @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
      .audio-card { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.4vmin; }
    .audio-card .audio-icon { font-size: 9vmin; line-height: 1; opacity: .92; }
    .audio-card .audio-label { font-size: 3.6vmin; color: #e2e8f0; max-width: 80%; text-align: center; }
    /* P0: HUD overlays (widgets sobrepostos por cima das zonas) */
    #overlays { position: fixed; inset: 0; z-index: 9000; pointer-events: none; }
    /* --ov-margin = margem de area segura (definida por overlay pelo player) */
    .ov { position: absolute; overflow: hidden; container-type: size; --ov-margin: 2vmin; }
    .ov .ov-inner { width: 100%; height: 100%; }
    /* L1: ancoras de posicionamento (incl. lower-third e fullscreen) */
    .ov-pos-top-left { left: var(--ov-margin); top: var(--ov-margin); }
    .ov-pos-top { left: 50%; top: var(--ov-margin); transform: translateX(-50%); }
    .ov-pos-top-right { right: var(--ov-margin); top: var(--ov-margin); }
    .ov-pos-left { left: var(--ov-margin); top: 50%; transform: translateY(-50%); }
    .ov-pos-center { left: 50%; top: 50%; transform: translate(-50%, -50%); }
    .ov-pos-right { right: var(--ov-margin); top: 50%; transform: translateY(-50%); }
    .ov-pos-bottom-left { left: var(--ov-margin); bottom: var(--ov-margin); }
    .ov-pos-bottom { left: 0; right: 0; bottom: 0; }
    .ov-pos-bottom-right { right: var(--ov-margin); bottom: var(--ov-margin); }
    .ov-pos-lower-third { left: 0; right: 0; bottom: var(--ov-margin); }
    .ov-pos-fullscreen { left: 0; top: 0; right: 0; bottom: 0; }
    /* L1: animacoes de entrada/saida (modo temporizado).
       O `.ov-inner` anima dentro da caixa, preservando o transform de ancora.
       enter_anim define a animacao; a saida reverte (exit none = sem efeito). */
    .ov.timed .ov-inner { opacity: 0; transition: opacity .5s ease, transform .5s ease, clip-path .5s ease; }
    .ov.timed.show .ov-inner { opacity: 1; transform: none; clip-path: inset(0 0 0 0); }
    .ov.timed.ov-enter-fade .ov-inner { opacity: 0; }
    .ov.timed.ov-enter-slide .ov-inner { opacity: 0; transform: translateY(45%); }
    .ov.timed.ov-pos-top .ov-enter-slide, .ov.timed.ov-enter-slide.ov-pos-top .ov-inner, .ov.timed.ov-enter-slide.ov-pos-top-left .ov-inner, .ov.timed.ov-enter-slide.ov-pos-top-right .ov-inner { transform: translateY(-45%); }
    .ov.timed.ov-enter-wipe .ov-inner { opacity: 1; clip-path: inset(0 100% 0 0); }
    .ov.timed.ov-exit-none.show .ov-inner { transition: none; }
    /* L4: camada de graficos ao vivo (disparo do operador), acima dos overlays */
    #live-layer { position: fixed; inset: 0; z-index: 9500; pointer-events: none; }
    /* Cartao de tomada de tela (takeover — ex.: ULTIMA HORA) */
    .takeover-card { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3vmin; text-align: center; color: #fff; padding: 6vmin; }
    .takeover-card .takeover-title { font: 800 11vmin/1.05 system-ui, sans-serif; letter-spacing: .02em; text-transform: uppercase; text-shadow: 0 .4vmin 1.2vmin rgba(0,0,0,.45); }
    .takeover-card .takeover-sub { font: 500 4.5vmin/1.2 system-ui, sans-serif; opacity: .95; max-width: 80%; }
    /* L2: gerador de caracteres (CG) / lower-third */
    .widget-lowerthird { --lt-accent: #2563eb; display: flex; align-items: flex-end; gap: 2cqmin; width: 100%; height: 100%; padding: 3cqmin; box-sizing: border-box; }
    .widget-lowerthird.lt-align-right { flex-direction: row-reverse; }
    .widget-lowerthird .lt-logo { flex: 0 0 auto; align-self: flex-end; }
    .widget-lowerthird .lt-logo img { height: 14cqmin; width: auto; max-width: 22cqmin; object-fit: contain; border-radius: 1cqmin; }
    .widget-lowerthird .lt-bar { display: flex; align-items: stretch; gap: 2cqmin; background: rgba(8,12,20,.82); backdrop-filter: blur(2px); border-radius: 1.4cqmin; overflow: hidden; box-shadow: 0 1cqmin 4cqmin rgba(0,0,0,.45); }
    .widget-lowerthird .lt-accent { flex: 0 0 1.4cqmin; background: var(--lt-accent); }
    .widget-lowerthird .lt-text { padding: 2.2cqmin 3cqmin; color: #fff; min-width: 0; }
    .widget-lowerthird .lt-title { font: 800 6.5cqmin/1.05 system-ui, sans-serif; letter-spacing: .01em; }
    .widget-lowerthird .lt-sub { margin-top: .8cqmin; font: 500 3.8cqmin/1.15 system-ui, sans-serif; color: var(--lt-accent); filter: brightness(1.5); }
    /* v34: widgets contagem, QR e cotacoes */
    .widget-countdown { align-items:center; justify-content:center; text-align:center; gap:3cqmin; background: var(--tv-slide-bg, radial-gradient(circle at 50% 30%, #1f2937, #000)); padding:4cqmin; }
    .widget-countdown .w-title { font-size:clamp(9px,7cqmin,44px); color:var(--tv-accent,#93c5fd); letter-spacing:.04em; text-transform:uppercase; }
    .widget-countdown .cd-grid { display:flex; gap:4cqmin; align-items:flex-end; justify-content:center; flex-wrap:wrap; }
    .widget-countdown .cd-cell { display:flex; flex-direction:column; align-items:center; gap:1cqmin; }
    .widget-countdown .cd-num { font-size:clamp(16px,20cqmin,160px); font-weight:800; line-height:1; font-variant-numeric:tabular-nums; }
    .widget-countdown .cd-lbl { font-size:clamp(8px,4cqmin,28px); color:#cbd5e1; text-transform:uppercase; letter-spacing:.08em; }
    .widget-countdown .cd-done { font-size:clamp(14px,12cqmin,90px); font-weight:800; color:var(--tv-accent,#fde047); }
    .widget-qr { align-items:center; justify-content:center; text-align:center; gap:3cqmin; background: var(--tv-slide-bg, radial-gradient(circle at 50% 30%, #1f2937, #000)); padding:4cqmin; }
    .widget-qr .qr-cap { font-size:clamp(10px,7cqmin,44px); color:var(--tv-text,#fff); font-weight:700; }
    .widget-qr .qr-img { width:auto; height:auto; max-width:80cqmin; max-height:70cqmin; background:#fff; padding:2cqmin; border-radius:2cqmin; object-fit:contain; }
    .widget-rates { align-items:stretch; justify-content:center; gap:1.5cqmin; background: var(--tv-slide-bg, radial-gradient(circle at 50% 30%, #1f2937, #000)); padding:4cqmin; }
    .widget-rates .w-title { font-size:clamp(9px,7cqmin,40px); color:var(--tv-accent,#93c5fd); letter-spacing:.04em; text-transform:uppercase; text-align:center; }
    .widget-rates .rt-list { display:flex; flex-direction:column; justify-content:center; gap:1.2cqmin; flex:1; }
    .widget-rates .rt-row { display:flex; align-items:center; justify-content:space-between; gap:3cqmin; padding:1.4cqmin 3cqmin; border-radius:1.5cqmin; background:rgba(255,255,255,.06); }
    .widget-rates .rt-pair { font-size:clamp(10px,7cqmin,52px); font-weight:700; color:var(--tv-text,#fff); }
    .widget-rates .rt-val { font-size:clamp(10px,7cqmin,52px); font-weight:800; color:#34d399; font-variant-numeric:tabular-nums; }
    /* P5: widgets avancados */
    .widget-worldclock, .widget-calendar, .widget-stocks, .widget-menuboard, .widget-dataset { justify-content:center; gap:2cqmin; background:var(--tv-slide-bg, radial-gradient(circle at 50% 30%, #1f2937, #000)); padding:4cqmin; }
    .widget-worldclock .w-title, .widget-calendar .w-title, .widget-stocks .w-title, .widget-menuboard .w-title, .widget-dataset .w-title { font-size:clamp(9px,7cqmin,40px); color:var(--tv-accent,#93c5fd); letter-spacing:.04em; text-transform:uppercase; text-align:center; }
    .wc-grid, .cal-list, .st-list { display:flex; flex-direction:column; gap:1.2cqmin; }
    .wc-row, .cal-row, .st-row { display:flex; align-items:center; justify-content:space-between; gap:3cqmin; padding:1.4cqmin 2.6cqmin; background:rgba(255,255,255,.07); border-radius:1.2cqmin; }
    .wc-city, .cal-title, .st-symbol { font-size:clamp(10px,6cqmin,44px); font-weight:700; color:var(--tv-text,#fff); }
    .wc-time, .cal-date, .st-price { font-size:clamp(10px,7cqmin,54px); font-weight:800; color:#34d399; font-variant-numeric:tabular-nums; }
    .cal-empty { font-size:clamp(10px,7cqmin,44px); text-align:center; color:#cbd5e1; }
    .mb-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:2cqmin; align-items:start; }
    .mb-cat { background:rgba(255,255,255,.07); border-radius:1.5cqmin; padding:2cqmin; }
    .mb-cat h3 { margin:0 0 1.4cqmin; font-size:clamp(12px,7cqmin,46px); color:#fde047; }
    .mb-item { display:flex; align-items:flex-start; justify-content:space-between; gap:2cqmin; padding:1cqmin 0; border-top:1px solid rgba(255,255,255,.12); }
    .mb-item b, .mb-item strong { font-size:clamp(10px,5.6cqmin,38px); }
    .mb-item small { display:block; margin-top:.5cqmin; color:#cbd5e1; font-size:clamp(8px,3.8cqmin,22px); }
    .ds-table { overflow:hidden; }
    .ds-table table { width:100%; border-collapse:collapse; table-layout:fixed; background:rgba(255,255,255,.05); border-radius:1.2cqmin; overflow:hidden; }
    .ds-table th, .ds-table td { padding:1.2cqmin 1.6cqmin; border-bottom:1px solid rgba(255,255,255,.1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:clamp(9px,4.4cqmin,30px); }
    .ds-table th { color:#93c5fd; text-align:left; text-transform:uppercase; letter-spacing:.04em; }
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="status" title="Conexão em tempo real"></div>
  <div id="message"></div>
  <div id="emergency"></div>
  <div id="overlays"></div>
  <audio id="bg-audio" loop></audio>
  <button id="sound-enable" hidden style="position:fixed;left:12px;bottom:12px;z-index:9999;padding:10px 14px;border:0;border-radius:8px;background:#7aa2f7;color:#0b0d16;font:600 14px system-ui;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.5)">Ativar som</button>
  <script src="player.js"></script>
</body>
</html>
